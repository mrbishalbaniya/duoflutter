name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag (e.g. v1.0.0)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  android-release:
    name: Android Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - run: flutter pub get

      - name: Read app version
        id: app_version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          NAME="${FULL%%+*}"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            TAG="${{ inputs.tag_name }}"
          else
            TAG="v${{ steps.app_version.outputs.name }}-manual.${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Configure signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: bash .github/scripts/setup-android-signing.sh

      - name: Build signed APK
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://duobackend.onrender.com/api' }}
          WS_BASE_URL: ${{ vars.WS_BASE_URL || 'wss://duobackend.onrender.com' }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=WS_BASE_URL=${WS_BASE_URL} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID:-599462036385-39dkh9btr5cslp7faegprvmc3haca5ac.apps.googleusercontent.com}

      - name: Build signed AAB
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://duobackend.onrender.com/api' }}
          WS_BASE_URL: ${{ vars.WS_BASE_URL || 'wss://duobackend.onrender.com' }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=WS_BASE_URL=${WS_BASE_URL} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID:-599462036385-39dkh9btr5cslp7faegprvmc3haca5ac.apps.googleusercontent.com}

      - run: bash .github/scripts/generate-changelog.sh RELEASE_NOTES.md "${{ steps.release_tag.outputs.tag }}"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Duo Mobile ${{ steps.release_tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_DISTRIBUTION_GROUPS: ${{ vars.FIREBASE_DISTRIBUTION_GROUPS }}
        run: bash .github/scripts/firebase-distribute.sh

      - name: Notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash .github/scripts/notify.sh success "Mobile Release" "Release ${{ steps.release_tag.outputs.tag }} APK/AAB published."

  ios-release:
    name: iOS Release Build
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
