name: duo_mobile
description: Duo dating app — Flutter mobile client for DuoBackend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  equatable: ^2.0.7
  web_socket_channel: ^3.0.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  google_sign_in: ^6.3.0
  flutter_web_auth_2: ^4.1.0
  latlong2: ^0.10.1
  geolocator: ^14.0.2
  flutter_animate: ^4.5.2
  lottie: ^3.3.3
  package_info_plus: ^9.0.1
  flutter_slidable: ^4.0.3
  webview_flutter: ^4.13.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  camera: ^0.12.0+1
  qr_flutter: ^4.1.0
  permission_handler: ^12.0.3
  flutter_image_compress: ^2.4.0
  record: ^6.2.1
  just_audio: ^0.10.6
  path_provider: ^2.1.6
  flutter_local_notifications: ^22.0.1
  screen_capture_event: ^1.2.0
  gal: ^2.3.2
  share_plus: ^10.1.4
  flutter_cache_manager: ^3.4.1
  esewa_flutter_sdk:
    path: ./esewa_flutter_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  # Android/iOS use pre-built assets from AppIcons/ (see AppIcons/README below).
  android: false
  ios: false
  image_path: AppIcons/playstore.png
  web:
    generate: true
    image_path: AppIcons/playstore.png
    background_color: "#B83280"
    theme_color: "#B83280"
  windows:
    generate: true
    image_path: AppIcons/playstore.png
  macos:
    generate: true
    image_path: AppIcons/playstore.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/lottie/duo_glow.json
    - assets/map/duo_globe.html
